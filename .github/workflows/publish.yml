name: Publish containers
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  images:
    strategy:
      matrix:
        service: [site, cms]
    runs-on: ubuntu-latest
    outputs:
      site-digest: ${{ steps.digest.outputs.site }}
      cms-digest: ${{ steps.digest.outputs.cms }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          {
            registry: ghcr.io,
            username: '${{ github.actor }}',
            password: '${{ secrets.GITHUB_TOKEN }}',
          }
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/estopia/apprentice-atlas-web-${{ matrix.service }}:${{ github.sha }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - id: digest
        run: echo "${{ matrix.service }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
      - uses: anchore/scan-action@v6
        with:
          {
            image: 'ghcr.io/estopia/apprentice-atlas-web-${{ matrix.service }}@${{ steps.build.outputs.digest }}',
            fail-build: true,
            severity-cutoff: high,
            output-format: table,
          }

  staging:
    needs: images
    runs-on: ubuntu-latest
    environment: staging
    env:
      PORTAINER_WEBHOOK: ${{ secrets.PORTAINER_STAGING_WEBHOOK }}
    steps:
      - name: Deploy exact image digests through Portainer
        if: env.PORTAINER_WEBHOOK != ''
        run: curl --fail --silent --show-error -X POST "$PORTAINER_WEBHOOK"
      - name: Report deployment configuration requirement
        if: env.PORTAINER_WEBHOOK == ''
        run: echo "Images published; configure PORTAINER_STAGING_WEBHOOK to enable automatic staging deployment."

  production:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [images, staging]
    runs-on: ubuntu-latest
    environment: production
    env:
      PORTAINER_WEBHOOK: ${{ secrets.PORTAINER_PRODUCTION_WEBHOOK }}
    steps:
      - name: Deploy promoted digests after manual approval
        if: env.PORTAINER_WEBHOOK != ''
        run: curl --fail --silent --show-error -X POST "$PORTAINER_WEBHOOK"
      - name: Report deployment configuration requirement
        if: env.PORTAINER_WEBHOOK == ''
        run: echo "Images published; configure PORTAINER_PRODUCTION_WEBHOOK before promotion."
