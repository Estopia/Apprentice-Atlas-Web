name: CI
on:
  pull_request:
  push:
    branches: [main, 'codex/**']
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with: { version: 10.28.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 24.18.0, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          PAYLOAD_SECRET: ci-build-secret
          DATABASE_URI: postgres://postgres:postgres@127.0.0.1:5432/apprentice_atlas

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with: { version: 10.28.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 24.18.0, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @apprentice-atlas/site exec playwright install --with-deps chromium firefox webkit
      - run: pnpm --filter @apprentice-atlas/site test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: playwright-report, path: apps/site/playwright-report, retention-days: 14 }
