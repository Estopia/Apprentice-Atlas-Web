name: apprentice-atlas-web

# Runtime-only stack for Portainer Agent environments where remote Compose builds
# cannot reach BuildKit. Build the two :local images on the target Docker host
# first, then deploy this file from the Git repository.
services:
  site:
    image: ${SITE_IMAGE:-ghcr.io/estopia/apprentice-atlas-web-site:local}
    pull_policy: never
    init: true
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://apprenticeatlas.com}
      CMS_INTERNAL_URL: http://cms:3001
      DATABASE_URI: ${DATABASE_URI:?DATABASE_URI must be set in Portainer}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-}
      REVALIDATION_SECRET: ${REVALIDATION_SECRET:-}
      FORM_SIGNING_SECRET: ${FORM_SIGNING_SECRET:-}
      CRON_SECRET: ${CRON_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Apprentice Atlas <hello@apprenticeatlas.com>}
      PARTNER_INBOX: ${PARTNER_INBOX:-hello@apprenticeatlas.com}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
    expose:
      - '3000'
    depends_on:
      cms:
        condition: service_healthy
    networks: [atlas-internal, proxy]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  cms:
    image: ${CMS_IMAGE:-ghcr.io/estopia/apprentice-atlas-web-cms:local}
    pull_policy: never
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://apprenticeatlas.com}
      CMS_PUBLIC_URL: ${CMS_PUBLIC_URL:-https://cms.apprenticeatlas.com}
      SITE_INTERNAL_URL: http://site:3000
      DATABASE_URI: ${DATABASE_URI:?DATABASE_URI must be set in Portainer}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET must be set in Portainer}
      REVALIDATION_SECRET: ${REVALIDATION_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-hello@apprenticeatlas.com}
      SUPABASE_S3_ENDPOINT: ${SUPABASE_S3_ENDPOINT:-}
      SUPABASE_S3_REGION: ${SUPABASE_S3_REGION:-eu-central-1}
      SUPABASE_S3_BUCKET: ${SUPABASE_S3_BUCKET:-marketing-media}
      SUPABASE_S3_ACCESS_KEY_ID: ${SUPABASE_S3_ACCESS_KEY_ID:-}
      SUPABASE_S3_SECRET_ACCESS_KEY: ${SUPABASE_S3_SECRET_ACCESS_KEY:-}
    expose:
      - '3001'
    networks: [atlas-internal, proxy]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

networks:
  atlas-internal:
    internal: true
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy}
